name: Publish to NPM Packages

on:
    push:
        tags-ignore:
            - "*-alpha*"
            - "*-beta*"
    workflow_dispatch:
        inputs:
            tag:
                description: "Tag to publish (e.g. v1.2.3)"
                required: true
                type: string
            shallow_since:
                description: "Optional shallow fetch cutoff date (YYYY-MM-DD) for branch validation; leave blank to unshallow."
                required: false
                type: string

permissions:
    id-token: write # Required for OIDC authentication
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  # Keep checkout light; branch validation will deepen/unshallow if needed.
                  fetch-depth: 1
                  ref: ${{ inputs.tag && format('refs/tags/{0}', inputs.tag) || github.ref }}
                  show-progress: false

            - name: Resolve tag
              id: tag
              env:
                  TAG_INPUT: ${{ inputs.tag }}
              run: |
                  CLEAN_TAG_INPUT=$(printf '%s' "$TAG_INPUT" | tr -d '\r' | xargs)
                  if [ -n "$CLEAN_TAG_INPUT" ]; then
                    echo "tag=$CLEAN_TAG_INPUT" >> "$GITHUB_OUTPUT"
                  else
                    echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Ensure tag is on allowed branch
              env:
                  SHALLOW_SINCE: ${{ inputs.shallow_since }}
              run: |
                  FETCH_DEPTH_ARGS=()
                  if [ -n "$SHALLOW_SINCE" ]; then
                    FETCH_DEPTH_ARGS=(--shallow-since="$SHALLOW_SINCE")
                  elif [ -f .git/shallow ]; then
                    git fetch origin --tags --unshallow
                  fi

                  git fetch origin --tags "${FETCH_DEPTH_ARGS[@]}"
                  git fetch origin --no-tags main "${FETCH_DEPTH_ARGS[@]}"
                  git fetch origin \
                    --no-tags \
                    "refs/heads/canary*:refs/remotes/origin/canary*" \
                    "refs/heads/dev*:refs/remotes/origin/dev*" \
                    "${FETCH_DEPTH_ARGS[@]}" || true
                  TAG_COMMIT=$(git rev-list -n 1 "${{ steps.tag.outputs.tag }}")
                  if git merge-base --is-ancestor "$TAG_COMMIT" "origin/main"; then
                    echo "Tag commit is on main."
                    exit 0
                  fi

                  MATCHING_BRANCH=$(git for-each-ref --format='%(refname:short)' refs/remotes/origin \
                    | grep -Ei 'origin/.*(canary|dev)' \
                    | while read -r branch; do
                        if git merge-base --is-ancestor "$TAG_COMMIT" "$branch"; then
                          echo "$branch"
                          break
                        fi
                      done)

                  note() { echo "$1"; }
                  if [ -n "$MATCHING_BRANCH" ]; then
                    note "Tag commit is on allowed branch: $MATCHING_BRANCH"
                  else
                    note "Tag commit is not on main or an allowed branch (canary/dev)." >&2
                    exit 1
                  fi

            - name: Check pre-release status
              id: prerelease
              env:
                  TAG_NAME: ${{ steps.tag.outputs.tag }}
              run: |
                  PRERELEASE_LABEL=""
                  if [[ "$TAG_NAME" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+-([0-9A-Za-z.-]+)(\+[0-9A-Za-z.-]+)?$ ]]; then
                    PRERELEASE_CHANNEL="${BASH_REMATCH[1]%%.*}"
                    case "$PRERELEASE_CHANNEL" in
                      rc|canary)
                        PRERELEASE_LABEL="$PRERELEASE_CHANNEL"
                        ;;
                      alpha|beta)
                        echo "npm publishing only allows canary* and rc* prerelease tags; alpha* and beta* are reserved for GitHub Packages." >&2
                        exit 1
                        ;;
                      *)
                        echo "Unsupported npm prerelease channel '$PRERELEASE_CHANNEL'. Only canary* and rc* are allowed." >&2
                        exit 1
                        ;;
                    esac
                  elif [[ ! "$TAG_NAME" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(\+[0-9A-Za-z.-]+)?$ ]]; then
                    echo "Unsupported tag format '$TAG_NAME'. Expected semver tags like v1.2.3, v1.2.3-rc.1, or v1.2.3-canary.1." >&2
                    exit 1
                  fi

                  if [[ -n "$PRERELEASE_LABEL" ]]; then
                    echo "IS_PRERELEASE=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "IS_PRERELEASE=false" >> "$GITHUB_OUTPUT"
                  fi

                  echo "PRERELEASE_LABEL=$PRERELEASE_LABEL" >> "$GITHUB_OUTPUT"

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 22.14.0
                  registry-url: https://registry.npmjs.org

            - name: Verify package metadata
              env:
                  TAG_NAME: ${{ steps.tag.outputs.tag }}
              run: |
                  TAG_VERSION="${TAG_NAME#v}"
                  PKG_NAME=$(node -p "require('./package.json').name")
                  PKG_VERSION=$(node -p "require('./package.json').version")

                  echo "Publishing package: $PKG_NAME"
                  echo "Package version: $PKG_VERSION"
                  echo "Tag version: $TAG_VERSION"

                  if [[ "$PKG_VERSION" != "$TAG_VERSION" ]]; then
                    echo "Tag '$TAG_NAME' does not match package.json version '$PKG_VERSION'." >&2
                    exit 1
                  fi

            - name: Update npm to latest # Ensuring NPM Trusted Publishing is Work
              run: npm install -g npm@latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Build
              run: bun run build

            - name: Publish
              env:
                  NODE_AUTH_TOKEN: ""
              run: |
                  if [[ "${{ steps.prerelease.outputs.IS_PRERELEASE }}" == "true" ]]; then
                    npm publish --registry https://registry.npmjs.org --access public --provenance --tag next
                  else
                    npm publish --registry https://registry.npmjs.org --access public --provenance
                  fi
